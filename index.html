<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Planificador de Turnos — Gestión de cuadrantes IT · Alicante 2026">
  <title>Planificador de Turnos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap">

  <!-- Cache-busting activo en CSS (Antídoto #1) -->
  <link rel="stylesheet" id="main-css" href="css/styles.css">
  <script>
    document.getElementById('main-css').href = 'css/styles.css?v=' + Date.now();
  </script>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loader-logo">Planificador de <span>Turnos</span></div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div style="font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:#3d4560;margin-top:4px;letter-spacing:.08em;text-transform:uppercase;">Iniciando sistema...</div>
</div>

<!-- Tooltip global -->
<div id="global-tooltip"></div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- App layout -->
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Planificador de <span>Turnos</span></div>
      <div class="logo-sub">Gestión de cuadrantes · 2026</div>
    </div>

    <nav class="sidebar-nav">
      <!-- Siempre visibles -->
      <button class="nav-item nav-active" data-nav="dashboard">
        <span class="nav-icon">◈</span> Dashboard
      </button>
      <button class="nav-item" data-nav="schedule">
        <span class="nav-icon">◻</span> Planificador
      </button>
      <!-- Solo visibles en modo admin -->
      <button class="nav-item nav-admin-only" data-nav="vacations">
        <span class="nav-icon">◇</span> Vacaciones
      </button>
      <button class="nav-item nav-admin-only" data-nav="report">
        <span class="nav-icon">◉</span> Informes
      </button>
      <button class="nav-item nav-admin-only" data-nav="settings">
        <span class="nav-icon">◎</span> Configuración
      </button>
      <button class="nav-item nav-admin-only" data-nav="forecast2027">
        <span class="nav-icon">🔮</span> Previsión 2027
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-secondary" id="admin-toggle-btn" onclick="toggleAdminMode()"
              style="width:100%;text-align:center;">
        🔐 Admin
      </button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()" title="Menú">☰</button>
        <span id="topbar-date" style="margin-left:8px;"></span>
      </div>
      <div class="top-bar-right">
        <div id="admin-badge">
          <span>⚡</span> ADMIN ACTIVO
        </div>
      </div>
    </header>

    <main class="main-content">
      <div id="app-root"></div>
    </main>
  </div>
</div>

<!-- Modal admin -->
<div id="modal-admin" class="modal hidden">
  <div class="modal-backdrop" onclick="closeAdminModal()"></div>
  <div class="modal-box" style="max-width:380px">
    <h3 class="modal-title">🔐 Acceso Administrador</h3>
    <p class="modal-desc">Introduce la contraseña para habilitar el modo de edición completo.</p>
    <div class="form-row">
      <label>Contraseña</label>
      <input type="password" id="admin-password-input" placeholder="••••••••" autocomplete="off">
    </div>
    <div id="admin-error-msg" class="hidden">Contraseña incorrecta. Inténtalo de nuevo.</div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAdminModal()">Cancelar</button>
      <button class="btn-primary" onclick="submitAdminPassword()">Verificar</button>
    </div>
  </div>
</div>

<!-- Modal edición fecha de incorporación -->
<div id="modal-startdate" class="modal hidden">
  <div class="modal-backdrop" onclick="closeEditStartDateModal()"></div>
  <div class="modal-box" style="max-width:400px" id="edit-startdate-content"></div>
</div>

<!-- Scripts en orden correcto de dependencias -->
<script src="js/utils.js"></script>
<script src="js/rules.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/report.js"></script>
<script src="js/github.js"></script>
<script src="js/forecast2027.js"></script>
<script src="js/app.js"></script>

<script>
  // Topbar: fecha actual
  (function() {
    const el = document.getElementById('topbar-date');
    if (!el) return;
    el.textContent = new Date().toLocaleDateString('es-ES', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  })();

  // Mobile sidebar
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
  };
</script>

</body>
</html>
